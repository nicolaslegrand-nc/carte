// ═══ CALCUL SIÈGES ═══
function repartir(vd,n){
  var s={};Object.keys(vd).forEach(function(k){s[k]=0;});
  for(var i=0;i<n;i++){
    var best=null,bv=-1;
    Object.keys(vd).forEach(function(k){var v=vd[k]/(s[k]+1);if(v>bv){bv=v;best=k;}});
    if(best)s[best]++;
  }
  return s;
}
function calcCongres(prov){
  var seuil=Math.ceil(INSCRITS[prov]*0.05),voix=VOIX_DATA[prov],elig={};
  Object.keys(voix).forEach(function(k){if(voix[k]>=seuil)elig[k]=voix[k];});
  return Object.keys(elig).length>0 ? repartir(elig,TOTAL_CONG[prov]) : {};
}

// ═══ INVERSION NOM ═══
function invNom(nom){
  var p=nom.trim().split(' ');if(p.length<=1)return nom;
  var ps=p.length;
  var deaccent=function(s){return s.replace(/[éèêë]/g,'e').replace(/[ÉÈÊË]/g,'E').replace(/[àâ]/g,'a').replace(/[ÀÂ]/g,'A').replace(/[îï]/g,'i').replace(/[ÎÏ]/g,'I').replace(/[ôû]/g,'o').replace(/[ÔÛ]/g,'O').replace(/ù/g,'u').replace(/Ù/g,'U').replace(/ü/g,'u').replace(/Ü/g,'U').replace(/ç/g,'c').replace(/Ç/g,'C').replace(/ñ/g,'n').replace(/Ñ/g,'N');};
  for(var i=p.length-1;i>=0;i--){
    var w=p[i],wc=deaccent(w).replace(/-/g,'').replace(/'/g,'');
    var up=wc.length>1&&/^[A-Za-z]+$/.test(wc)&&wc===wc.toUpperCase();
    var ab=wc.replace('.','').length<=3&&w[0]===w[0].toUpperCase();
    if(up||ab){ps=i+1;break;}else if(w[0]===w[0].toUpperCase()){ps=i;}else{ps=i+1;break;}
  }
  if(ps>=p.length)ps=p.length-1;if(ps===0)return nom;
  return p.slice(ps).join(' ')+' '+p.slice(0,ps).join(' ');
}

// ═══ DONNÉES DÉRIVÉES ═══
function getSiegesCongres(){
  var out={};
  ['sud','nord','iles'].forEach(function(prov){ out[prov]=calcCongres(prov); });
  return out;
}

function getElusParGroupe(siegesCong){
  // Retourne pour chaque groupe : {visible:[{nom,prov}], attente:[{nom,prov}], totalVisible, totalAttente}
  var result=[];
  GROUPES.forEach(function(g){
    var visibles=[], attente=[];
    g.membres.forEach(function(m){
      var prov=m[0], listeNom=m[1];
      var n=siegesCong[prov][listeNom]||0;
      var cands=(CANDS_CONG[g.nom]&&CANDS_CONG[g.nom][prov])||[];
      // Auto : une province compte dès qu'elle a des voix publiées (comme la page Provinces)
      var isVisible=Object.keys(VOIX_DATA[prov]||{}).some(function(k){return VOIX_DATA[prov][k]>0;});
      for(var i=0;i<n;i++){
        var item={nom: cands[i]?invNom(cands[i]):('Élu '+(i+1)), prov:prov};
        if(isVisible) visibles.push(item); else attente.push(item);
      }
    });
    if(visibles.length+attente.length>0){
      result.push({groupe:g, visibles:visibles, attente:attente});
    }
  });
  return result;
}

var W=900,CX=450,CY=360,GREY='#cccccc';
function getSeats(tot){
  var rd=[{r:130,f:.30},{r:195,f:.34},{r:260,f:.36}];
  var rings=rd.map(function(r){return{r:r.r,n:Math.round(tot*r.f)};});
  rings[rings.length-1].n+=tot-rings.reduce(function(s,r){return s+r.n;},0);
  var seats=[];
  rings.forEach(function(ring){
    for(var i=0;i<ring.n;i++){
      var a=Math.PI-i*Math.PI/Math.max(ring.n-1,1);
      seats.push({x:Math.round((CX+ring.r*Math.cos(a))*10)/10,y:Math.round((CY-ring.r*Math.sin(a))*10)/10,a:a});
    }
  });
  seats.sort(function(a,b){return b.a-a.a;});return seats;
}

var svgData=[];
var majoBarDataC=null;
function attachSeatEvents(){
  var svgEl=document.getElementById('svg-cong');
  var activeSeat=null;
  svgEl.querySelectorAll('.rrb-seat').forEach(function(el){
    el.addEventListener('mouseenter',function(){
      if(activeSeat)return;
      var d=svgData[parseInt(this.getAttribute('data-i'))];
      if(d)showElu(d.nom,d.groupe,d.col,d.seats);
    });
    el.addEventListener('mouseleave',function(){ if(!activeSeat) hideElu(); });
    el.addEventListener('click',function(e){
      e.stopPropagation();
      var d=svgData[parseInt(this.getAttribute('data-i'))];
      if(!d)return;
      if(activeSeat===this){ activeSeat=null; hideElu(); }
      else { activeSeat=this; showElu(d.nom,d.groupe,d.col,d.seats); }
    });
  });
  // Tap en dehors d'un siège : referme le nom et réinitialise la barre
  svgEl.addEventListener('click',function(e){
    if(!(e.target.classList && e.target.classList.contains('rrb-seat'))){ activeSeat=null; hideElu(); }
  });
}

function renderSVG(){
  svgData=[];
  var siegesCong=getSiegesCongres();
  var groupesData=getElusParGroupe(siegesCong);

  // Construire la liste ordonnée des 54 sièges (groupe par groupe, dans l'ordre GROUPES)
  var sColors=[],sNoms=[],sGroupes=[],sIsVisible=[],sGroupeSeats=[];
  groupesData.forEach(function(gd){
    var col=gd.groupe.couleur, gv=gd.visibles.length;
    gd.visibles.forEach(function(item){
      sColors.push(col); sNoms.push(item.nom); sGroupes.push(gd.groupe.nom); sIsVisible.push(true); sGroupeSeats.push(gv);
    });
    gd.attente.forEach(function(item){
      sColors.push(GREY); sNoms.push(item.nom); sGroupes.push(gd.groupe.nom); sIsVisible.push(false); sGroupeSeats.push(gv);
    });
  });
  while(sColors.length<54){sColors.push(GREY);sNoms.push('');sGroupes.push('');sIsVisible.push(false);sGroupeSeats.push(0);}

  var seats=getSeats(54), HH=CY+75;

  // Légende SVG — blocs triés par suffrages obtenus décroissants (puis par sièges)
  function blocVoix(gd){var t=0;gd.groupe.membres.forEach(function(m){t+=(VOIX_DATA[m[0]]&&VOIX_DATA[m[0]][m[1]])||0;});return t;}
  var legItems=groupesData.slice().sort(function(a,b){
    var d=blocVoix(b)-blocVoix(a);
    if(d!==0) return d;
    return (b.visibles.length+b.attente.length)-(a.visibles.length+a.attente.length);
  });

  var COLS=3,CW=268,sx=Math.floor((W-COLS*CW)/2);
  var lr=legItems.length>0?Math.ceil(legItems.length/COLS):1;
  var HSVG=HH+lr*22+30+44;

  var s='';
  s+='<defs><linearGradient id="bgG" x1="0" y1="1" x2="0" y2="0">';
  s+='<stop offset="0%" stop-color="#c47d00" stop-opacity="0.45"/>';
  s+='<stop offset="55%" stop-color="#e8a000" stop-opacity="0.12"/>';
  s+='<stop offset="100%" stop-color="#ffffff" stop-opacity="0"/></linearGradient></defs>';
  s+='<rect width="'+W+'" height="'+HSVG+'" fill="white"/>';
  s+='<rect width="'+W+'" height="'+HSVG+'" fill="url(#bgG)"/>';
  s+='<image href="'+LOGO_RRB_WM+'" x="700" y="8" width="165" height="88" opacity="0.9" preserveAspectRatio="xMidYMid meet"/>';
  if(typeof LOGO_CONGRES!=='undefined' && LOGO_CONGRES){
    s+='<image href="'+LOGO_CONGRES+'" x="16" y="10" width="170" height="80" preserveAspectRatio="xMinYMid meet"/>';
  }

  var assignedSeats=0;
  seats.forEach(function(seat,i){
    var col=sColors[i]||GREY, x=seat.x, y=seat.y, nom=sNoms[i]||'', grp=sGroupes[i]||'', vis=sIsVisible[i], gseats=sGroupeSeats[i]||0;
    var sid='rg_'+i;
    s+='<defs><radialGradient id="'+sid+'" cx="32%" cy="28%" r="68%">';
    s+='<stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>';
    s+='<stop offset="45%" stop-color="'+col+'" stop-opacity="0"/>';
    s+='<stop offset="100%" stop-color="#000000" stop-opacity="0.35"/></radialGradient></defs>';
    s+='<circle cx="'+x+'" cy="'+(Math.round((y+2)*10)/10)+'" r="12.5" fill="#00000020"/>';
    if(nom && vis){
      var di=svgData.length;
      assignedSeats++;
      svgData.push({nom:nom, groupe:grp, col:col, seats:gseats});
      s+='<circle cx="'+x+'" cy="'+y+'" r="12.5" fill="'+col+'" stroke="white" stroke-width="1.5" data-i="'+di+'" class="rrb-seat" style="cursor:pointer"/>';
      s+='<circle cx="'+x+'" cy="'+y+'" r="12.5" fill="url(#'+sid+')" style="pointer-events:none"/>';
    } else if(nom && !vis){
      var di2=svgData.length;
      svgData.push({nom:'En attente…', groupe:grp, col:GREY, seats:0});
      s+='<circle cx="'+x+'" cy="'+y+'" r="12.5" fill="'+GREY+'" stroke="white" stroke-width="1.5" data-i="'+di2+'" class="rrb-seat" style="cursor:pointer"/>';
    } else {
      s+='<circle cx="'+x+'" cy="'+y+'" r="12.5" fill="'+GREY+'" stroke="white" stroke-width="1.5"/>';
    }
  });

  s+='<text id="count_c" x="'+CX+'" y="'+(CY-8)+'" text-anchor="middle" font-family="Arial Black,Arial,sans-serif" font-size="46" font-weight="900" fill="#111">54</text>';
  s+='<text x="'+CX+'" y="'+(CY+18)+'" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#888" letter-spacing="4">SIÈGES</text>';

  if(assignedSeats < 54){
    s+='<rect x="'+(CX-110)+'" y="'+(CY+34)+'" width="220" height="28" rx="14" fill="#fff3cc" stroke="#e8a000" stroke-width="1.5"/>';
    s+='<text x="'+CX+'" y="'+(CY+53)+'" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#92400e">⏳ En cours de collecte</text>';
  }

  // Barre de majorité absolue Congrès (28 sur 54)
  var majoY=HH+20;
  var majoC=Math.ceil(54/2)+1;
  var barW=W-280, barX=140;
  s+='<text id="majo_lbl_c" x="'+barX+'" y="'+(majoY-12)+'" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#666">Majorité absolue</text>';
  s+='<text id="majo_txt_c" x="'+(barX+barW)+'" y="'+(majoY-12)+'" text-anchor="end" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#666">'+majoC+' sièges requis</text>';
  s+='<text id="majo_name_c" x="'+CX+'" y="'+(majoY-12)+'" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700"></text>';
  s+='<rect x="'+barX+'" y="'+majoY+'" width="'+barW+'" height="8" rx="4" fill="#f0e2c0"/>';
  s+='<rect id="majo_fill_c" x="'+barX+'" y="'+majoY+'" width="0" height="8" rx="4" fill="#e8a000"/>';
  var markXc=barX+barW*(majoC/54);
  s+='<rect x="'+(markXc-1)+'" y="'+(majoY-4)+'" width="2" height="16" fill="#e82020"/>';
  majoBarDataC={barX:barX,barW:barW,tot:54,majo:majoC};

  s+='<line x1="20" y1="'+(HH+44)+'" x2="'+(W-20)+'" y2="'+(HH+44)+'" stroke="#e8a000" stroke-width="1" stroke-opacity="0.4"/>';

  if(legItems.length>0){
    legItems.forEach(function(gd,idx){
      var c=idx%COLS, row=Math.floor(idx/COLS), fx=sx+c*CW, fy=HH+59+row*22;
      var nm=gd.groupe.nom.length>26?gd.groupe.nom.substring(0,26)+'…':gd.groupe.nom;
      var col=gd.groupe.couleur, tv=gd.visibles.length, ta=gd.attente.length;
      var dispCol=tv>0?col:GREY;
      s+='<circle cx="'+(fx+7)+'" cy="'+(fy-4)+'" r="7" fill="'+dispCol+'"/>';
      s+='<text x="'+(fx+18)+'" y="'+fy+'" font-family="Arial,sans-serif" font-size="11" fill="'+(tv>0?'#333':'#aaa')+'">'+nm+' <tspan font-weight="900" fill="'+dispCol+'">'+(tv>0?tv:ta)+'</tspan>'+(ta>0&&tv>0?'<tspan font-size="9" fill="#bbb"> (+'+ta+')</tspan>':(ta>0&&tv===0?'<tspan font-size="9" fill="#bbb"> (att.)</tspan>':''))+'</text>';
    });
  } else {
    s+='<text x="'+CX+'" y="'+(HH+59)+'" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#bbb" font-style="italic">En attente des résultats</text>';
  }

  s+='<rect id="ib_c" x="250" y="10" width="400" height="60" rx="10" fill="#c47d00" opacity="0"/>';
  s+='<text id="it1_c" x="450" y="36" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#fff" opacity="0"></text>';
  s+='<text id="it2_c" x="450" y="56" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="900" fill="#fff" opacity="0"></text>';

  var el=document.getElementById('svg-cong');
  el.setAttribute('viewBox','0 0 '+W+' '+HSVG);
  el.innerHTML=s;
  attachSeatEvents();
}

function renderLegendeBas(){
  var siegesCong=getSiegesCongres();
  var groupesData=getElusParGroupe(siegesCong);
  var sorted=groupesData.slice().sort(function(a,b){return b.visibles.length-a.visibles.length;});

  var h='';
  sorted.forEach(function(gd,idx){
    var g=gd.groupe, col=g.couleur, uid='cg_'+idx;
    var tv=gd.visibles.length, ta=gd.attente.length;
    var dispCol=tv>0?col:'#ccc';
    var elusHtml='<div class="rrb-elus" id="elus-'+uid+'" data-seats="'+tv+'" data-col="'+col+'" data-nom="'+g.nom.replace(/"/g,'&quot;')+'" style="display:none"><div class="rrb-elus-inner">';
    gd.visibles.forEach(function(item,i){

    el.addEventListener('click',function(){ toggleElus(this.getAttribute('data-uid')); });
    el.addEventListener('mouseenter',function(){
      var seats=parseInt(this.getAttribute('data-seats'))||0;
      if(seats>0) updateMajoBarC(seats, this.getAttribute('data-col'), this.getAttribute('data-nom'));
    });
    el.addEventListener('mouseleave',function(){ resetMajoBarC(); });
  });
  document.getElementById('lw-cong').querySelectorAll('.rrb-elus').forEach(function(el){
    el.addEventListener('mouseenter',function(){
      var seats=parseInt(this.getAttribute('data-seats'))||0;
      if(seats>0) updateMajoBarC(seats, this.getAttribute('data-col'), this.getAttribute('data-nom'));
    });
    el.addEventListener('mouseleave',function(){ resetMajoBarC(); });
  });
}

// ═══ INTERACTIONS ═══
function showElu(elu,groupe,col,seats){
  var ib=document.getElementById('ib_c'),it1=document.getElementById('it1_c'),it2=document.getElementById('it2_c');
  if(!ib)return;
  ib.setAttribute('opacity','0.92');ib.setAttribute('fill',col);
  it1.textContent=groupe;it1.setAttribute('opacity','1');
  it2.textContent=elu;it2.setAttribute('opacity','1');
  if(seats!==undefined && seats>0) updateMajoBarC(seats, col, groupe);
}
function hideElu(){
  var ib=document.getElementById('ib_c'),it1=document.getElementById('it1_c'),it2=document.getElementById('it2_c');
  if(!ib)return;
  ib.setAttribute('opacity','0');it1.setAttribute('opacity','0');it2.setAttribute('opacity','0');
  resetMajoBarC();
}
function updateMajoBarC(seats, col, groupe){
  var d=majoBarDataC; if(!d) return;
  var fill=document.getElementById('majo_fill_c');
  var txt=document.getElementById('majo_txt_c');
  var lbl=document.getElementById('majo_lbl_c');
  if(!fill) return;
  var w=Math.min(d.barW, d.barW*(seats/d.tot));
  fill.setAttribute('width', w);
  fill.setAttribute('fill', col);
  var nm = groupe.length>26?groupe.substring(0,26)+'…':groupe;
  var nameEl=document.getElementById('majo_name_c');
  if(nameEl){ nameEl.textContent = nm; nameEl.setAttribute('fill', col); }
  txt.textContent = seats+' / '+d.majo+' sièges requis';
  var cnt=document.getElementById('count_c'); if(cnt){ cnt.textContent=seats+' / '+d.tot; cnt.setAttribute('fill',col); }
}
function resetMajoBarC(){
  var d=majoBarDataC; if(!d) return;
  var fill=document.getElementById('majo_fill_c');
  var txt=document.getElementById('majo_txt_c');
  var lbl=document.getElementById('majo_lbl_c');
  if(!fill) return;
  fill.setAttribute('width', 0);
  fill.setAttribute('fill', '#e8a000');
  var nameEl=document.getElementById('majo_name_c'); if(nameEl) nameEl.textContent='';
  var cnt=document.getElementById('count_c'); if(cnt){ cnt.textContent=d.tot; cnt.setAttribute('fill','#111'); }
  lbl.textContent = 'Majorité absolue';
  txt.textContent = d.majo+' sièges requis';
  txt.setAttribute('fill', '#666');
}
function toggleElus(uid){
  var el=document.getElementById('elus-'+uid),arr=document.getElementById('arr-'+uid);
  if(!el)return;var open=el.style.display!=='none';
  el.style.display=open?'none':'block';
  if(arr)arr.classList.toggle('open',!open);
}

function exporterImage(prov){
  var svgEl = document.getElementById('svg-'+prov);
  var svgData = new XMLSerializer().serializeToString(svgEl);
  var vb = svgEl.getAttribute('viewBox').split(' ').map(Number);
  var w = vb[2], h = vb[3];
  var scale = 2; // export en haute résolution
  var canvas = document.createElement('canvas');
  canvas.width = w*scale; canvas.height = h*scale;
  var ctx = canvas.getContext('2d');
  var img = new Image();
  var svgBlob = new Blob([svgData], {type:'image/svg+xml;charset=utf-8'});
  var url = URL.createObjectURL(svgBlob);
  img.onload = function(){
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    URL.revokeObjectURL(url);
    canvas.toBlob(function(blob){
      var a = document.createElement('a');
      var dateStr = new Date().toISOString().slice(0,10);
      a.href = URL.createObjectURL(blob);
      a.download = 'hemicycle_'+prov+'_'+dateStr+'.png';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
    }, 'image/png');
  };
  img.onerror = function(){
    alert('Export impossible — réessaie après le chargement complet de la page.');
    URL.revokeObjectURL(url);
  };
  img.src = url;
}
